name: Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  create-release-pr:
    runs-on: [ self-hosted, Linux, X64 ]

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "fudio101"
          git config user.email "thenguyen1024@gmail.com"
          git remote set-url origin git@github.com:${{ github.repository }}.git

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release branch and commit
        run: |
          git checkout -b release/v${{ steps.version.outputs.new_version }}
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git push -u origin release/v${{ steps.version.outputs.new_version }}

      - name: Create and auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e
          
          echo "Creating PR for version bump..."
          PR_URL=$(gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.new_version }}" \
            --body "Automated version bump to v${{ steps.version.outputs.new_version }}" \
            --base main \
            --head release/v${{ steps.version.outputs.new_version }} \
            --label release)
          
          if [ -z "$PR_URL" ]; then
            echo "::error::Failed to create PR"
            exit 1
          fi
          
          echo "Created PR: $PR_URL"
          
          PR_NUMBER=$(echo $PR_URL | sed 's|.*/||')
          
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge $PR_NUMBER --squash --delete-branch
          
          echo "::notice::PR #$PR_NUMBER created and merged successfully"
